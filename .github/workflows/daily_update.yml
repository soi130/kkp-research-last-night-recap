name: Daily Market Update v3

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install yfinance google-genai pytz

      - name: Verify Script Content
        run: cat update_data.py

      - name: Run Update Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python3 update_data.py

      - name: Commit and Force Push
        run: |
          git config --global user.name 'Market Bot'
          git config --global user.email 'bot@github.com'
          git add src/data.json
          git commit -m "Auto-update market data: $(date)" || echo "No changes to commit"
          git push origin main --force
