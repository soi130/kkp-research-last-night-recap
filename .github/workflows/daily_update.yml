name: Daily Market Update

# Workflow to fetch market data and update KKP Recap daily at 5 AM BKK
on:
  schedule:
    # 22:00 UTC is 05:00 AM Bangkok Time
    - cron: '0 22 * * *'
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          pip install yfinance google-genai pytz

      - name: Run Update Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python update_data.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'Market Bot'
          git config --global user.email 'bot@github.com'
          git add src/data.json
          git commit -m "Auto-update market data: $(date)" || echo "No changes to commit"
          git push
